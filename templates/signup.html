{% extends "base.html" %}
{% block title %}회원가입 | 오늘 냉장고{% endblock %}

{% block content %}
<section class="section">
  <div class="authWrap">
    <div class="card authCard">
      <h1 class="authTitle">회원가입</h1>
      <p class="authText">계정을 만들고 북마크와 후기를 저장하세요.</p>

      <form action="{{ url_for('signupPage') }}" method="post">
        <div class="formGroup">
          <label for="userName" class="formLabel">아이디</label>
          <input type="text" id="userName" name="userName" class="input" required />
        </div>

        <div class="formGroup">
          <label for="nickName" class="formLabel">닉네임</label>
          <input type="text" id="nickName" name="nickName" class="input" required />
        </div>

        <div class="formGroup">
          <label for="password" class="formLabel">비밀번호</label>
          <input type="password" id="password" name="password" class="input" required />
        </div>

        <div class="formGroup">
          <label for="passwordConfirm" class="formLabel">비밀번호 확인</label>
          <input type="password" id="passwordConfirm" name="passwordConfirm" class="input" required />
        </div>

        <button type="submit" class="btn btnPrimary">회원가입</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
