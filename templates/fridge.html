{% extends "base.html" %}
{% block title %}현재 냉장고 | 오늘 냉장고{% endblock %}

{% block content %}

<section class="section">
    <div class="container" style="max-width: 800px; margin: 0 auto;">
        
        <div class="sectionHeader fridgeHeader">
            <div>
                <h1 class="sectionTitle">현재 냉장고</h1>
                <p class="sectionDesc">재료 분류는 냉장고에 추가와 동시에 자동으로 됩니다.</p>
            </div>
        </div>

        <div class="card" style="margin-bottom: 32px;">
            <div class="cardBody">
                <form id="addForm" class="fridgeAddForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="formField">
                        <label class="formLabel" for="ingredient_name">재료명 <span class="reqStar" aria-hidden="true">*</span></label>
                        <input type="text" id="ingredient_name" class="input" placeholder="예: 사과, 당근, 버터" required autocomplete="off" maxlength="200">
                    </div>
                    <div class="formField">
                        <label class="formLabel" for="expire_date">유통기한 <span style="font-weight:400; color:var(--colorTextSub); font-size:12px;">(선택)</span></label>
                        <input type="date" id="expire_date" class="input">
                    </div>
                    <div class="formField fridgeAddButtonWrap">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btnPrimary fridgeAddButton">추가</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="sectionHeader" style="margin-top: 40px; margin-bottom: 16px;">
            <h2 class="sectionTitle" style="font-size: 20px;">보관 중인 식재료 목록</h2>
            <select id="sortSelect" class="input" style="width: auto; padding: 6px 32px 6px 12px; font-size: 14px;" onchange="loadItems()">
                <option value="expire_asc">유통기한 임박순</option>
                <option value="name_asc">이름 가나다순</option>
                <option value="created_desc">최근 등록순</option>
            </select>
        </div>

        <!-- 로딩 상태 표시 -->
        <div id="loadingState" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-top: 20px;">
            <div class="skeletonCard" style="height: 180px;"></div>
            <div class="skeletonCard" style="height: 180px;"></div>
            <div class="skeletonCard" style="height: 180px;"></div>
            <div class="skeletonCard" style="height: 180px;"></div>
        </div>
        
<ul id="itemList" style="display: flex; flex-direction: column; gap: 16px; list-style: none; padding: 0; margin: 0; display: none; margin-bottom: 32px;">
            <!-- 스크립트를 통해 아이템 렌더링 -->
        </ul>

        <div id="recipeSection" style="margin-top: 48px; display: none;">
            <div class="sectionHeader">
                <h2 class="sectionTitle" style="font-size: 20px;">💡 이런 레시피는 어때요?</h2>
                <p class="sectionDesc">유통기한이 임박한 재료를 활용한 추천 요리입니다.</p>
            </div>
            
            <div class="grid3" id="recipeList">
                <!-- 스크립트를 통해 추천 레시피 렌더링 -->
            </div>
        </div>
    </div>
</section>

<!-- 상세/수정 모달 -->
<div id="itemModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px);">
    <div class="card" style="width: 90%; max-width: 420px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto;">
        <span onclick="closeModal()" style="position: absolute; right: 20px; top: 16px; cursor: pointer; font-size: 24px; color: var(--colorTextSub); line-height: 1;">&times;</span>
        <div class="cardBody">
            <h2 id="modalTitle" style="margin: 0 0 20px 0; font-size: 20px; font-weight: 800; color: var(--colorText); padding-bottom: 12px; border-bottom: 2px solid var(--colorPrimary);">재료 상세</h2>
            
            <div id="modalContent">
                <div style="text-align: center; margin-bottom: 20px;">
                    <img id="detailImage" src="" alt="재료 사진" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; box-shadow: var(--shadowMedium); border: 4px solid white;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 12px; font-size: 15px; padding: 10px 0;">
                    <div style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--colorBorder);">
                        <strong style="color: var(--colorTextSub);">재료명</strong>
                        <span id="detailName" style="font-weight: 600; color: var(--colorText);"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--colorBorder);">
                        <strong style="color: var(--colorTextSub);">분류</strong>
                        <span id="detailCategory" style="color: var(--colorText);"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--colorBorder);">
                        <strong style="color: var(--colorTextSub);">유통기한</strong>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span id="detailExpire" style="color: var(--colorText);"></span>
                            <span id="detailBadge" style="padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white;"></span>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding-bottom: 4px;">
                        <strong style="color: var(--colorTextSub);">등록일시</strong>
                        <span id="detailCreated" style="font-size: 13px; color: var(--colorTextSub);"></span>
                    </div>
                </div>
                
                <div style="margin-top: 24px; display: flex; gap: 10px;">
                    <button type="button" class="btn btnSecondary" style="flex: 1; background: #e8f5e9; color: #55b271; border: none; font-weight: 600; padding: 12px; border-radius: 8px;" onclick="closeModal()">닫기</button>
                    <button type="button" class="btn btnPrimary" style="flex: 1; background: #55b271; border: none; font-weight: 600; padding: 12px; border-radius: 8px;" onclick="showEditForm()">수정하기</button>
                </div>
            </div>

            <form id="editForm" style="display: none;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" id="edit_id">
                <div class="formGroup">
                    <label class="formLabel">재료명</label>
                    <input type="text" id="edit_name" class="input" required maxlength="40">
                </div>
                <div class="formGroup" style="margin-bottom: 24px;">
                    <label class="formLabel">유통기한</label>
                    <input type="date" id="edit_expire" class="input" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btnGhost" style="flex: 1;" onclick="cancelEdit()">취소</button>
                    <button type="submit" class="btn btnPrimary" style="flex: 1;">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 검색 결과 (가상 마트 상품) -->
<div id="searchResultModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 1050; padding: 16px; backdrop-filter: blur(2px);">
    <div class="card" style="width: 100%; max-width: 520px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.2);">
        <div class="cardBody" style="overflow: auto; flex: 1;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0; font-size: 18px; font-weight: 800; color: var(--colorText);">재료 추가 확인</h2>
                <button type="button" class="btn btnGhost" style="padding: 6px 12px;" onclick="closeSearchResultModal()" aria-label="닫기">&times;</button>
            </div>
            <p id="searchResultHint" style="display: none; margin: 0 0 12px 0; font-size: 13px; color: var(--colorTextSub); line-height: 1.5;"></p>
            <div id="searchResultList"></div>
        </div>
        <div style="padding: 16px; border-top: 1px solid var(--colorBorder); display: flex; gap: 10px; flex-shrink: 0; background: #fafbfc;">
            <button type="button" class="btn btnSecondary" style="flex: 1;" onclick="closeSearchResultModal()">닫기</button>
            <button type="button" class="btn btnPrimary" style="flex: 1;" onclick="confirmAddFromModal()">냉장고에 추가하기</button>
        </div>
    </div>
</div>

    <!-- 폰트어썸 아이콘 링크 -->

    <script>
        let addFormCategoryConfirmed = false;

        function showToast(message, type="success") {
            let wrap = document.querySelector('.flashWrap');
            if (!wrap) {
                wrap = document.createElement('div');
                wrap.className = 'flashWrap';
                const container = document.querySelector('main .container');
                if (container) container.insertBefore(wrap, container.firstChild);
            }
            const msg = document.createElement('div');
            msg.className = `flashMessage flash${type.charAt(0).toUpperCase() + type.slice(1)}`;
            msg.innerText = message;
            wrap.appendChild(msg);
            
            setTimeout(() => {
                msg.style.transition = 'opacity 0.3s ease';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 300);
            }, 3000);
        }

        function setExpireMonthMin() {
            const el = document.getElementById("expire_month");
            if (!el) return;
            const now = new Date();
            const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
            el.setAttribute("min", ym);
        }

        /**
         * 분류별 데모용 최대 유통기한(오늘 기준 며칠 뒤까지) — 날짜 풀·월 입력 max·가격 곡선에서 공통 사용.
         */
        function categoryShelfMaxDays(category) {
            const c = String(category || "기타").trim();
            const map = {
                수산물: 5,
                육류: 7,
                채소: 21,
                과일: 35,
                유제품: 28,
                가공식품: 120,
                기타: 60,
            };
            return map[c] != null ? map[c] : map["기타"];
        }

        /** 오늘 + 분류별 최대일이 속한 연·월 (type=month 의 max) */
        function maxMonthStringForCategory(category) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const end = new Date(today);
            end.setDate(end.getDate() + categoryShelfMaxDays(category));
            const y = end.getFullYear();
            const m = String(end.getMonth() + 1).padStart(2, "0");
            return `${y}-${m}`;
        }

        /** 분류 확정 전에는 월 비활성화, 확정 후 min~max 로 브라우저 달력에서 막음 */
        function syncExpireMonthConstraints() {
            const el = document.getElementById("expire_month");
            if (!el) return;
            setExpireMonthMin();
            const minV = el.getAttribute("min") || "";
            const cat = ((document.getElementById("category") || {}).value || "").trim();
            const ready = !!(cat && addFormCategoryConfirmed);
            if (!ready) {
                el.disabled = true;
                el.removeAttribute("max");
                el.title = "먼저 자동 분류 또는 직접 선택으로 분류를 정한 뒤, 현실적인 범위의 달만 고를 수 있습니다.";
                el.value = "";
                return;
            }
            el.disabled = false;
            const maxV = maxMonthStringForCategory(cat);
            el.setAttribute("max", maxV);
            el.title = `이 분류는 대략 ${maxV}까지의 달에서만 유통기한을 고를 수 있습니다.`;
            if (el.value && maxV && el.value > maxV) el.value = "";
            if (el.value && minV && el.value < minV) el.value = "";
        }

        /** 서버 `normalize_ingredient_name_for_query`와 동일 (반복·구분자 나열 축약, 숫자 불가) */
        function collapseRepeatedChunk(s) {
            s = String(s).trim();
            const n = s.length;
            if (n < 2) return s;
            for (let period = 1; period <= Math.floor(n / 2); period++) {
                if (n % period !== 0) continue;
                const chunk = s.slice(0, period);
                if (chunk.repeat(n / period) === s) return chunk;
            }
            return s;
        }
        function normalizeIngredientSegment(seg) {
            let s = String(seg).trim();
            if (!s) return "";
            const partsWs = s.split(/\s+/);
            if (partsWs.length > 1 && new Set(partsWs).size === 1) s = partsWs[0];
            return collapseRepeatedChunk(s);
        }
        function normalizeIngredientNameForQuery(raw) {
            const s = String(raw == null ? "" : raw).trim();
            if (!s) return { ok: false, msg: "재료명을 입력해주세요.", name: "" };
            const parts = s.split(/[,，;；]+/);
            const chunks = [];
            for (const p of parts) {
                const seg = normalizeIngredientSegment(p);
                if (seg) chunks.push(seg);
            }
            if (!chunks.length) return { ok: false, msg: "재료명을 입력해주세요.", name: "" };
            const uniq = [];
            for (const c of chunks) {
                if (!uniq.includes(c)) uniq.push(c);
            }
            if (uniq.length > 1) return { ok: false, msg: "한 번에 하나의 재료만 검색할 수 있습니다.", name: "" };
            const name = uniq[0];
            if (/\d/.test(name)) return { ok: false, msg: "재료명에는 숫자를 사용할 수 없습니다.", name: "" };
            return { ok: true, msg: "", name };
        }

        /** 재료명(편집/개별 토큰): 한글만 허용 */
        const INGREDIENT_NAME_RE = /^[\uAC00-\uD7A3]+$/;
        const INGREDIENT_LETTER_RE = /[\uAC00-\uD7A3]/;
        const INGREDIENT_DIGITS_ONLY_RE = /^[\d\s]+$/;

        const NONFOOD_FRAGMENTS = [
            "텔레비전", "스마트폰", "컴퓨터", "자동차", "오토바이", "세탁기", "냉장고",
            "쇼파", "소파", "침대", "책상", "의자", "책장", "옷장", "화장실", "거실",
            "노트북", "핸드폰", "태블릿", "에어컨", "티비", "자전거", "비행기", "기차",
            "지하철", "버스", "택시", "아파트", "건물", "학교", "회사",
        ];
        const FOOD_SUBSTRINGS = (() => {
            const groups = [
                ["전복", "고등어", "연어", "참치", "생선", "오징어", "문어", "낙지", "홍합", "멸치", "다시마", "미역", "새우", "조개", "굴", "김"],
                ["소고기", "돼지고기", "닭고기", "삼겹", "목살", "안심", "소시지", "베이컨", "곱창", "양고기", "햄", "닭", "돼지"],
                ["요거트", "요구르트", "치즈", "버터", "우유", "크림"],
                ["파스타", "스파게티", "고추장", "된장", "통조림", "식용유", "라면", "과자", "빵", "간장", "설탕", "소금", "김치", "두부"],
                ["브로콜리", "콩나물", "애호박", "청경채", "깻잎", "시금치", "상추", "배추", "토마토", "피망", "쪽파", "대파", "신파", "실파", "부추", "미나리", "열무", "당근", "양파", "마늘", "감자", "고구마", "오이", "버섯", "무우", "숙주", "파"],
                ["가지"],
                ["바나나", "복숭아", "오렌지", "딸기", "수박", "참외", "망고", "키위", "포도", "사과", "배", "귤"],
            ];
            const extra = [
                "계란", "달걀", "쌀", "밀가루", "찹쌀", "현미", "들기름", "참기름",
                "식초", "물엿", "올리고당", "꿀", "잼", "떡", "당면", "국수", "소면", "중면",
                "미숫가루", "녹두", "팥", "완두", "옥수수", "들깨", "깨",
                "carrot", "onion", "garlic", "egg", "milk", "beef", "pork", "chicken",
            ];
            return [...new Set(groups.flat().concat(extra))];
        })();

        function validateIngredientNameClient(raw) {
            const name = String(raw == null ? "" : raw).trim();
            if (!name.length) {
                return { ok: false, msg: "재료명을 입력해주세요." };
            }
            if (name.length > 40) {
                return { ok: false, msg: "재료명은 40글자 이내로 입력해주세요." };
            }
            if (!INGREDIENT_NAME_RE.test(name)) {
                return { ok: false, msg: "재료명은 한글만 입력해주세요." };
            }
            if (!INGREDIENT_LETTER_RE.test(name)) {
                return { ok: false, msg: "재료명은 한글을 포함해야 합니다." };
            }
            const compact = name.replace(/\s+/g, "");
            const nonfoodSorted = [...NONFOOD_FRAGMENTS].sort((a, b) => b.length - a.length);
            for (let i = 0; i < nonfoodSorted.length; i++) {
                if (compact.includes(nonfoodSorted[i])) {
                    return { ok: false, msg: "올바른 재료명을 입력하세요" };
                }
            }
            const nl = name.toLowerCase();
            const foodSorted = [...FOOD_SUBSTRINGS].sort((a, b) => b.length - a.length);
            for (let i = 0; i < foodSorted.length; i++) {
                if (nl.includes(foodSorted[i].toLowerCase())) {
                    return { ok: true, msg: "" };
                }
            }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text == null ? "" : String(text);
            return d.innerHTML;
        }

        function formatYMD(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");
            return `${y}-${m}-${day}`;
        }

        function startOfDay(d) {
            const x = new Date(d);
            x.setHours(0, 0, 0, 0);
            return x;
        }

        /** from~to(포함) 모든 날짜를 YYYY-MM-DD 배열로 */
        function datesInInclusiveRange(fromD, toD) {
            const out = [];
            const c = startOfDay(new Date(fromD));
            const end = startOfDay(new Date(toD));
            while (c <= end) {
                out.push(formatYMD(new Date(c)));
                c.setDate(c.getDate() + 1);
            }
            return out;
        }

        /** 검색 조건 문자열 → 결정적 시드 (같은 입력이면 같은 목록) */
        function searchResultSeed(baseName, category, ymStr) {
            const s = String(baseName || "") + "\0" + String(category || "") + "\0" + String(ymStr || "");
            let h = 2166136261 >>> 0;
            for (let i = 0; i < s.length; i++) {
                h ^= s.charCodeAt(i);
                h = Math.imul(h, 16777619) >>> 0;
            }
            return h >>> 0;
        }

        function mulberry32(seed) {
            let a = seed >>> 0;
            return function () {
                a |= 0;
                a = (a + 0x6d2b79f5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function shuffleInPlaceSeeded(arr, rng) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        /** 오늘 ~ 오늘+(분류별 최대일) 날짜 풀 */
        function expiryDatePoolFromTodayRange(category) {
            const today = startOfDay(new Date());
            const end = new Date(today);
            end.setDate(end.getDate() + categoryShelfMaxDays(category));
            return datesInInclusiveRange(today, end);
        }

        /**
         * 선택 연·월과 분류 현실 범위의 교집합. 교집합이 비면(예: 6개월 뒤 달만 골랐을 때) 분류 범위만 사용.
         */
        function expiryDatePoolForYearMonth(ymStr, category) {
            const catPool = expiryDatePoolFromTodayRange(category);
            const catSet = new Set(catPool);
            if (!ymStr || ymStr.length < 7) return catPool;

            const parts = ymStr.split("-");
            const y = parseInt(parts[0], 10);
            const mo = parseInt(parts[1], 10);
            if (!y || !mo || mo < 1 || mo > 12) return catPool;

            const today = startOfDay(new Date());
            const startOfMonth = new Date(y, mo - 1, 1);
            const endOfMonth = new Date(y, mo, 0);
            let from = startOfMonth > today ? startOfMonth : today;
            let to = endOfMonth;
            if (from > to) return catPool;

            const monthDates = datesInInclusiveRange(from, to);
            const intersected = monthDates.filter((d) => catSet.has(d));
            return intersected.length ? intersected : catPool;
        }

        /**
         * 검색 결과 행마다 유통기한이 겹치지 않도록, 풀에서 비복원 추출.
         * seed로 Fisher–Yates 섞기 → 같은 검색 조건이면 같은 날짜 조합(당일 기준).
         * 반환 전 날짜 오름차순 정렬로 목록 순서도 고정.
         */
        // [DISABLED] 유통기한 랜덤 생성/가상 상품 목록 로직은 현재 플로우에서 사용하지 않습니다.
        // (실제 추가는 /api/fridge/resolve-add + /api/fridge/add-batch로 처리)
        function pickUniqueExpiryDates(ymStr, count, seed, category) {
            let pool = ymStr && ymStr.length >= 7
                ? expiryDatePoolForYearMonth(ymStr, category)
                : expiryDatePoolFromTodayRange(category);
            if (!pool.length) {
                return [formatYMD(startOfDay(new Date()))];
            }
            const copy = pool.slice();
            const rng = mulberry32((seed ^ 0x9e3779b9) >>> 0);
            shuffleInPlaceSeeded(copy, rng);
            const take = Math.min(count, copy.length);
            const picked = copy.slice(0, take);
            picked.sort((a, b) => String(a).localeCompare(String(b)));
            return picked;
        }

        /**
         * 재료명당 고정 느낌의 기본가(원): 문자열 해시 → 1,200~9,999원 구간.
         * 같은 재료명이면 검색할 때마다 동일한 기본가가 나오도록 함(데모 일관성).
         */
        function ingredientBasePrice(name) {
            const s = String(name || "").trim();
            if (!s) return 3500;
            let h = 2166136261 >>> 0;
            for (let i = 0; i < s.length; i++) {
                h ^= s.charCodeAt(i);
                h = Math.imul(h, 16777619) >>> 0;
            }
            return 1200 + (h % 8800);
        }

        /**
         * 기본가 × (남은 보관일 보정). 임박할수록(남은 일수↓) 약간 저렴: 최대 약 22% 낮음 → 가까울수록 할인.
         */
        function priceFromBaseAndExpireDate(basePrice, expireDateStr, category) {
            const today = startOfDay(new Date());
            const exp = new Date(String(expireDateStr) + "T12:00:00");
            if (isNaN(exp.getTime())) return Math.max(500, Math.round(basePrice / 10) * 10);
            const exp0 = startOfDay(exp);
            const daysLeft = Math.max(0, Math.round((exp0 - today) / 86400000));
            const refDays = Math.max(14, categoryShelfMaxDays(category));
            const t = Math.min(1, daysLeft / refDays);
            const mult = 0.78 + 0.22 * t;
            let p = Math.round(basePrice * mult);
            p = Math.max(500, Math.round(p / 10) * 10);
            return p;
        }

        function buildMockSearchRows(baseName, category, ymStr) {
            const seed = searchResultSeed(baseName, category, ymStr || "");
            const nDesired = 4 + (seed % 3);
            const uniqueDates = pickUniqueExpiryDates(ymStr, nDesired, seed, category);
            const base = ingredientBasePrice(baseName);
            const rows = [];
            for (let i = 0; i < uniqueDates.length; i++) {
                const expire_date = uniqueDates[i];
                const price = priceFromBaseAndExpireDate(base, expire_date, category);
                rows.push({
                    id: `sr-${seed}-${i}-${expire_date.replace(/-/g, "")}`,
                    price,
                    expire_date,
                    category,
                    ingredient_name: baseName,
                });
            }
            rows.sort((a, b) => a.expire_date.localeCompare(b.expire_date));
            return rows;
        }

        /** foodRecipes.RCP_PARTS_DTLS에서 찾은 후보 → 기존 검색 행 형식(유통기한·가격은 기존 로직). */
        function buildRowsFromDbCandidates(baseName, category, ymStr, candidates) {
            if (!candidates || !candidates.length) return [];
            const baseSeed = searchResultSeed(baseName, category, ymStr || "");
            const n = Math.min(candidates.length, Math.max(4, 4 + (baseSeed % 3)));
            const pool = pickUniqueExpiryDates(ymStr, n, baseSeed, category);
            const basePrice = ingredientBasePrice(baseName);
            const rows = [];
            for (let i = 0; i < n; i++) {
                const c = candidates[i];
                const expire_date = pool[i % pool.length] || pool[0];
                const rowSeed = (baseSeed ^ ((c.recipe_id || 0) * 1315423911) + i * 2654435761) >>> 0;
                const price = priceFromBaseAndExpireDate(basePrice + (rowSeed % 400), expire_date, category);
                rows.push({
                    id: `db-${c.recipe_id}-${i}-${expire_date.replace(/-/g, "")}`,
                    price,
                    expire_date,
                    category,
                    ingredient_name: baseName,
                });
            }
            rows.sort((a, b) => a.expire_date.localeCompare(b.expire_date));
            return rows;
        }

                    loadingState.innerHTML = `<p style="color:var(--colorTextSub);">${data.message || '데이터를 불러오지 못했습니다.'}</p>`;

                    list.innerHTML = '<div class="emptyState" style="background: white; border-radius: var(--radiusLg); box-shadow: var(--shadowSoft);">냉장고가 텅 비어있습니다.<br>위에서 식재료를 검색해 담아보세요!</div>';
                    return;
                }

                globalAllItems = data.items;
                globalFridgeGroups = {};

                data.items.forEach(item => {
                    const amt = (item.amounts != null && Number.isFinite(item.amounts)) ? item.amounts : 1;
                    if (!globalFridgeGroups[item.ingredient_name]) {
                        globalFridgeGroups[item.ingredient_name] = {
                            ...item,
                            quantity: amt,
                            instances: [item]
                        };
                    } else {
                        globalFridgeGroups[item.ingredient_name].quantity += amt;
                        globalFridgeGroups[item.ingredient_name].instances.push(item);
                        
                        if (item.days_left < globalFridgeGroups[item.ingredient_name].days_left) {
                            globalFridgeGroups[item.ingredient_name].days_left = item.days_left;
                            globalFridgeGroups[item.ingredient_name].expire_date = item.expire_date;
                        }
                    }
                });

                let groupedArray = Object.values(globalFridgeGroups);
                
                if (sort === 'expire_asc') {
                    groupedArray.sort((a, b) => a.days_left - b.days_left);
                } else if (sort === 'name_asc') {
                    groupedArray.sort((a, b) => a.ingredient_name.localeCompare(b.ingredient_name));
                } else if (sort === 'created_desc') {
                    groupedArray.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                }

                groupedArray.forEach(group => {
                    let badgeClass = 'badge-success';
                    let badgeText = '';

                    // 임박(7일 이내) 혹은 지남(0 이하)인 항목 수 세기
                    const imminentCount = group.instances.reduce((acc, inst) => {
                        const a = (inst.amounts != null && Number.isFinite(inst.amounts)) ? inst.amounts : 1;
                        return acc + (inst.days_left <= 7 ? a : 0);
                    }, 0);

                    if (imminentCount > 0) {
                        badgeClass = 'badge-danger';
                        badgeText = `유통기한 임박: ${imminentCount}개`;
                    } else {
                        badgeClass = 'badge-success';
                        badgeText = `신선 보관중`;
                    }

                    let badgeStyle = '';
                    if (badgeClass === 'badge-success') {
                        badgeStyle = 'background-color: #2ecc71; color: white;';
                    } else if (badgeClass === 'badge-warning') {
                        badgeStyle = 'background-color: #f1c40f; color: #2c3e50;';
                    } else {
                        badgeStyle = 'background-color: #e74c3c; color: white;';
                    }

                    const imageUrl = group.image_url || 'https://images.unsplash.com/photo-1540420773420-3366772f4999?q=80&w=200&h=200&auto=format&fit=crop';

                    const categoryLabels = [...new Set(
                        group.instances.map(inst => {
                            const c = (inst.category || '기타').trim();
                            return c || '기타';
                        })
                    )];
                    const categoryDisplay = categoryLabels.length === 1
                        ? categoryLabels[0]
                        : categoryLabels.join(' · ');

                    const singleExpire =
                        group.quantity === 1
                            ? (group.instances[0]?.expire_date || group.expire_date || "").trim()
                            : "";
                    const singleExpiryHtml =
                        singleExpire !== ""
                            ? `<div style="font-size: 13px; color: var(--colorTextSub); margin-bottom: 6px; font-weight: 600;">~${singleExpire}까지</div>`
                            : "";
                    
                    const li = document.createElement('li');
                    li.style = "background: white; border: 1px solid var(--colorBorder); border-radius: var(--radiusLg); padding: 20px 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative;";
                    li.onmouseover = function() { this.style.transform = 'translateY(-4px)'; this.style.boxShadow = 'var(--shadowMedium)'; };
                    li.onmouseout = function() { this.style.transform = 'none'; this.style.boxShadow = 'none'; };
                    li.onclick = () => openGroupModal(group.ingredient_name);
                    
                    li.innerHTML = `
                        ${group.quantity > 1 ? `<div style="position: absolute; top: -8px; right: -8px; background: var(--colorPrimary); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; box-shadow: var(--shadowSoft);">+${group.quantity}</div>` : ''}
                        
                        <div style="width: 76px; height: 76px; border-radius: 50%; overflow: hidden; background-color: #f1f3f5; margin: 0 auto 16px auto; box-shadow: var(--shadowSoft); border: 3px solid white;">
                            <img src="${imageUrl}" alt="${group.ingredient_name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div style="font-size: 17px; font-weight: 800; color: var(--colorText); margin-bottom: 4px;">${group.ingredient_name}</div>
                        <div style="font-size: 13px; font-weight: 600; color: var(--colorPrimary); margin-bottom: 8px; letter-spacing: -0.02em;">${categoryDisplay}</div>
                        ${singleExpiryHtml}
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
                            ${imminentCount > 0 ? `<span class="badge-dday" style="${badgeStyle}; font-size: 11px; padding: 4px 10px;">${badgeText}</span>` : `<span style="font-size: 13px; color: #2ecc71; font-weight: 600;">${badgeText}</span>`}
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("데이터 로드 오류:", err);
            }
        }

        function openGroupModal(ingredientName) {
            const group = globalFridgeGroups[ingredientName];
            if (!group) return;

            const imageUrl = group.image_url || 'https://images.unsplash.com/photo-1540420773420-3366772f4999?q=80&w=200&h=200&auto=format&fit=crop';
            document.getElementById('modalTitle').innerText = `${ingredientName} 상세정보`;

            const contentDiv = document.getElementById('modalContent');
            
            group.instances.sort((a, b) => a.days_left - b.days_left);

            let instancesHtml = `<div style="font-size: 16px; font-weight: 700; color: var(--colorText); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--colorBorder);">보관 중인 항목 <span style="color: var(--colorPrimary);">${group.quantity}개</span></div>`;
            
            group.instances.forEach((inst) => {
                let badgeClass = 'badge-success';
                let badgeText = `D-${inst.days_left}`;
                if (inst.days_left < 0) { badgeClass = 'badge-danger'; badgeText = `(D+${Math.abs(inst.days_left)})`; }
                else if (inst.days_left <= 3) { badgeClass = 'badge-warning'; }
                else if (inst.days_left === 0) { badgeClass = 'badge-danger'; badgeText = `D-Day`; }

                let badgeStyle = badgeClass === 'badge-success' ? 'background-color: #2ecc71; color: white;' :
                                 badgeClass === 'badge-warning' ? 'background-color: #f1c40f; color: #2c3e50;' :
                                 'background-color: #e74c3c; color: white;';

                const createdDate = inst.created_at ? inst.created_at.split(' ')[0] : '-';
                const instAmounts = (inst.amounts != null && Number.isFinite(inst.amounts)) ? inst.amounts : 1;

                instancesHtml += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f8f9fa; border-radius: var(--radiusMd); margin-bottom: 10px; border: 1px solid #e9ecef;">
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span style="font-size: 15px; font-weight: 700; color: var(--colorText);">${inst.expire_date}까지</span>
                                <span class="badge-dday" style="${badgeStyle} padding: 3px 8px; font-size: 11px;">${badgeText}</span>
                                <span class="badge-dday" style="background: #111827; color: white; padding: 3px 8px; font-size: 11px;">수량 ${instAmounts}개</span>
                            </div>
                            <div style="font-size: 13px; color: var(--colorTextSub);">등록일: ${createdDate} | ${inst.category || '기타'}</div>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <button class="btn btnGhost" style="padding: 6px 12px; font-size: 12px; height: auto; color: #e74c3c; background: #fff5f5;" onclick="deleteItem(${inst.id})">삭제</button>
                        </div>
                    </div>
                `;
            });

            contentDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 24px;">
                    <img src="${imageUrl}" alt="재료 사진" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; box-shadow: var(--shadowMedium); border: 5px solid white;">
                </div>
                <div style="display: flex; flex-direction: column; padding: 0;">
                    ${instancesHtml}
                </div>
                <div style="margin-top: 24px;">
                    <button type="button" class="btn btnSecondary" style="width: 100%; font-weight: 600; padding: 12px; border-radius: 8px;" onclick="closeModal()">닫기</button>
                </div>
            `;

            document.getElementById('editForm').style.display = 'none';
            contentDiv.style.display = 'block';
            document.getElementById('itemModal').style.display = 'flex';
        }

        function openEditForm(id) {
            const item = globalAllItems.find(i => i.id === id);
            if (!item) return;

            document.getElementById('edit_id').value = item.id;
            document.getElementById('edit_name').value = item.ingredient_name;
            document.getElementById('edit_expire').value = item.expire_date;

            document.getElementById('modalContent').style.display = 'none';
            document.getElementById('editForm').style.display = 'block';
            document.getElementById('modalTitle').innerText = '재료 수정';
        }

        function cancelEdit() {
            const name = document.getElementById('edit_name').value;
            document.getElementById('editForm').style.display = 'none';
            document.getElementById('modalContent').style.display = 'block';
            
            // Re-open the group modal to refresh the state
            if(globalFridgeGroups[name]) {
                openGroupModal(name);
            } else {
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('itemModal').style.display = 'none';
        }

        // 재료 수정 처리
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const editName = document.getElementById('edit_name').value;
            const nameCheck = validateIngredientNameClient(editName);
            if (!nameCheck.ok) {
                showToast(nameCheck.msg, 'error');
                return;
            }
            const payload = {
                ingredient_name: editName,
                expire_date: document.getElementById('edit_expire').value
            };

            try {
                const res = await fetch(`/api/fridge/edit/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    showToast('성공적으로 수정되었습니다.');
                    await loadItems(); 
                    loadRecommendedRecipes();
                    
                    openGroupModal(payload.ingredient_name);
                } else {
                    const data = await res.json();
                    showToast(data.message || '수정에 실패했습니다.', 'error');
                }
            } catch (err) {
                showToast('서버와의 통신 오류가 발생했습니다.', 'error');
            }
        });

        // 재료 추가: foodRecipes.RCP_PARTS_DTLS에서 존재 여부 확인 후 amounts/유통기한으로 바로 저장
        let addConfirmItems = []; // { ingredient_name, category, qty }
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rawName = document.getElementById('ingredient_name').value.trim();
            if (!rawName) {
                showToast('재료명을 입력해주세요.', 'error');
                return;
            }
            // 입력 제약: 한글 + ','만 허용, 공백은 ',' 전후에만 허용
            if (!/^[\uAC00-\uD7A3]+(\s*,\s*[\uAC00-\uD7A3]+)*$/.test(rawName)) {
                showToast("재료명은 한글과 ','만 입력해주세요. 공백은 ',' 전후에만 허용됩니다.", "error");
                return;
            }

            try {
                const res = await fetch('/api/fridge/resolve-add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: rawName }),
                    credentials: 'same-origin'
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    showToast(data.message || '재료 조회에 실패했습니다.', 'error');
                    return;
                }

                const items = data.items || [];
                const notFound = data.not_found || [];
                if (notFound.length) {
                    showToast('재료 없음: ' + notFound.join(', '), 'error');
                }

                if (!items.length) {
                    showToast('조회된 재료가 없습니다.', 'error');
                    openAddConfirmModal([]);
                    return;
                }

                openAddConfirmModal(items);
            } catch (err) {
                console.error(err);
                showToast('서버 통신 오류가 발생했습니다.', 'error');
            }
        });

        function openAddConfirmModal(items) {
            addConfirmItems = (items || []).map((it) => ({
                ingredient_name: it.ingredient_name,
                category: it.category || '기타',
                qty: 1,
            }));

            const list = document.getElementById('searchResultList');
            const hint = document.getElementById('searchResultHint');
            hint.style.display = 'none';

            if (!addConfirmItems.length) {
                list.innerHTML = `
                    <div class="emptyState" style="padding: 28px 16px; text-align: center; color: var(--colorTextSub); line-height: 1.55;">
                        <p style="margin: 0; font-weight: 600; color: var(--colorText);">조회된 재료가 없습니다</p>
                    </div>`;
                openSearchResultModal();
                return;
            }

            list.innerHTML = addConfirmItems
                .map((it, idx) => {
                    return `
                        <div style="padding: 12px 0; border-bottom: 1px solid var(--colorBorder);">
                            <div style="display:flex; align-items:center; justify-content:space-between; gap: 12px;">
                                <div style="font-weight: 800; color: var(--colorText);">
                                    ${escapeHtml(it.ingredient_name)}(${escapeHtml(it.category)})
                                    <span style="margin-left: 8px; display:inline-flex; align-items:center; gap: 6px; font-weight: 700; color: var(--colorTextSub);">
                                        <button type="button" class="btn btnGhost" style="padding: 6px 10px;" onclick="decAddQty(${idx})">-</button>
                                        <span id="addQty_${idx}" style="min-width: 28px; text-align:center; font-weight: 800; color: var(--colorPrimary);">${it.qty}</span>
                                        <button type="button" class="btn btnGhost" style="padding: 6px 10px;" onclick="incAddQty(${idx})">+</button>
                                        개를 추가하시겠습니까
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                })
                .join('');

            openSearchResultModal();
        }

        function incAddQty(idx) {
            if (!addConfirmItems[idx]) return;
            addConfirmItems[idx].qty = Math.min(99, (addConfirmItems[idx].qty || 1) + 1);
            const el = document.getElementById('addQty_' + idx);
            if (el) el.textContent = addConfirmItems[idx].qty;
        }

        function decAddQty(idx) {
            if (!addConfirmItems[idx]) return;
            addConfirmItems[idx].qty = Math.max(1, (addConfirmItems[idx].qty || 1) - 1);
            const el = document.getElementById('addQty_' + idx);
            if (el) el.textContent = addConfirmItems[idx].qty;
        }

        async function confirmAddFromModal() {
            if (!addConfirmItems || !addConfirmItems.length) {
                showToast('추가할 재료가 없습니다.', 'error');
                return;
            }

            const expireDate = document.getElementById('expire_date').value || null;
            const payload = {
                expire_date: expireDate,
                items: addConfirmItems.map((it) => ({
                    ingredient_name: it.ingredient_name,
                    amounts: it.qty,
                })),
            };

            try {
                const res = await fetch('/api/fridge/add-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'same-origin'
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    showToast(data.message || '추가에 실패했습니다.', 'error');
                    return;
                }

                closeSearchResultModal();
                showToast('냉장고에 담았습니다.', 'success');
                await loadItems();
                if (typeof loadRecommendedRecipes === 'function') {
                    loadRecommendedRecipes();
                }
            } catch (err) {
                console.error(err);
                showToast('서버 통신 오류로 추가하지 못했습니다.', 'error');
            }
        }

        // 재료 삭제 처리
        async function deleteItem(id) {
            if (!confirm('해당 식재료를 삭제하시겠습니까?')) return;
            try {
                const res = await fetch(`/api/fridge/delete/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('성공적으로 삭제되었습니다.');
                    const item = globalAllItems.find(i => i.id === id);
                    const groupName = item ? item.ingredient_name : null;
                    
                    await loadItems();
                    loadRecommendedRecipes();
                    
                    if (groupName && globalFridgeGroups[groupName]) {
                        openGroupModal(groupName);
                    } else {
                        closeModal();
                    }
                } else {
                    showToast('삭제에 실패했습니다.', 'error');
                }
            } catch (err) {
                showToast('서버 통신 오류가 발생했습니다.', 'error');
            }
        }

        async function loadRecommendedRecipes() {
            const list = document.getElementById('recipeList');
            const section = document.getElementById('recipeSection');
            
            section.style.display = 'block';
            list.innerHTML = `
                <div class="skeletonCard"></div>
                <div class="skeletonCard"></div>
                <div class="skeletonCard"></div>
            `;
            
            try {
                const res = await fetch('/api/fridge/recipes');
                const data = await res.json();
                console.error(data)
                if (res.ok && data.recipes && data.recipes.length > 0) {
                    list.innerHTML = '';
                    
                    data.recipes.forEach(recipe => {
                        const a = document.createElement('a');
                        a.href = `/recipes/${recipe.recipeID}`;
                        a.style = "text-decoration: none; color: inherit;";
                        a.innerHTML = `
                            <div class="card" style="transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; height: 100%; display: flex; flex-direction: column;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='var(--shadowMedium)';" onmouseout="this.style.transform='none'; this.style.boxShadow='var(--shadowSoft)';">
                                <img src="${recipe.ATT_FILE_NO_MAIN}" alt="${recipe.RCP_NM}" style="width: 100%; height: 160px; object-fit: cover; border-top-left-radius: var(--radiusLg); border-top-right-radius: var(--radiusLg);">
                                <div class="cardBody" style="padding: 16px; flex: 1;">
                                    <h3 style="margin: 0 0 8px 0; font-size: 16px; font-weight: 700; color: var(--colorText);">${recipe.RCP_NM}</h3>
                                    <p style="margin: 0; font-size: 13px; color: var(--colorTextSub); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${recipe.description}</p>
                                </div>
                            </div>
                        `;
                        list.appendChild(a);
                    });
                } else {
                    section.style.display = 'none';
                }
            } catch (err) {
                console.error("추천 레시피 로드 오류:", err);
                section.style.display = 'none';
            }
        }

        // 메인 유통기한 알람에서 넘어오는 openIngredient 처리: 해당 재료 상세 모달 자동 오픈
        const urlParams = new URLSearchParams(window.location.search);
        const openIngredient = (urlParams.get('openIngredient') || '').trim();

        loadItems().then(() => {
            if (openIngredient) {
                openGroupModal(openIngredient);
                // 반복 오픈 방지: 주소에서 openIngredient 제거
                try {
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.delete('openIngredient');
                    window.history.replaceState({}, '', newUrl.toString());
                } catch (e) {}
            }
        });
        loadRecommendedRecipes();
    </script>
{% endblock %}
