{% extends "base.html" %}
{% block title %}로그인 | 오늘 냉장고{% endblock %}

{% block content %}
<section class="section">
  <div class="authWrap">
    <div class="card authCard">
      <h1 class="authTitle">로그인</h1>
      <p class="authText">오늘 냉장고에 로그인하고 냉장고 재고를 관리해보세요.</p>

      <form action="{{ url_for('loginPage') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">        <div class="formGroup">
          <label for="userName" class="formLabel">아이디</label>
          <input type="text" id="userName" name="userName" class="input" required />
        </div>

        <div class="formGroup">
          <label for="password" class="formLabel">비밀번호</label>
          <input type="password" id="password" name="password" class="input" required />
        </div>

        <button type="submit" class="btn btnPrimary">로그인</button>
      </form>

      <div style="margin-top: 16px;">
        <a href="{{ url_for('signupPage') }}" class="btn btnGhost">회원가입 하러 가기</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
